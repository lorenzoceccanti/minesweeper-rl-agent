main:
  auto_test: true
  # forza device pytorch ("cpu", "cuda", "mps")
  device: cuda

dqn:
  # alternative: fully_conv_3layer_64ch_11in, global_skip_conv_3layer_64ch_11in 
  architecture_name: fully_conv_3layer_64ch_11in
  # number of hidden convolution channels (called F)
  hidden_channels: 64
  # G size in the global_skip_connection architecture
  global_features_dim: 32
  train:
    agent_seed: 42
    batch_size: 64
    board_height: 9
    board_width: 9
    checkpoint_dir: checkpoints/dqn
    discount_factor: 0.9
    final_epsilon: 0.05
    epsilon_decay_type: exponential # linear, exponential
    epsilon_beta: 0.9995
    learning_rate: 0.00018544040049250931
    learning_starts: 1000
    n_episodes: 50000
    n_mines: 10
    render_mode: null
    replay_buffer_capacity: 100000
    start_epsilon: 1.0
    target_update_frequency: 500
    train_env_seed_start: 50000
    train_frequency: 4
    validation_episodes: 500
    validation_frequency: 100
    validation_seed_start: 500000
    wandb_entity: null
    wandb_project: minesweeper-rl
  test:
    checkpoint_path: checkpoints/dqn/2026-07-16-16-36-14-best.pt
    board_height: 9
    board_width: 9
    n_mines: 10
    test_seed_start: 1000000
    test_seed_count: 1000
    render_mode: null
    agent_seed: 42
    moving_average_window: 50
    test_output_dir: plots/test
    log_wandb: true
    wandb_project: minesweeper-rl
    wandb_entity: null

ppo:
  # alternative: fully_conv_3layer_64ch_11in, global_skip_conv_3layer_64ch_11in 
  architecture_name: global_skip_conv_3layer_64ch_11in
  # number of hidden convolution channels (called F)
  hidden_channels: 128
  # G size in the global_skip_connection architecture
  global_features_dim: 64
  # MLP hidden dimension of the critic head
  critic_hidden_size: 256
  train:
    actor_learning_rate: 0.0002137795035981122
    agent_seed: 42
    batch_size: 64
    board_height: 9
    board_width: 9
    checkpoint_dir: checkpoints/ppo
    clip_epsilon: 0.1
    critic_learning_rate: 0.0007465458238530321
    discount_factor: 0.95
    entropy_coefficient: 0.001
    gae_lambda: 0.95
    max_actor_grad_norm: 1.0
    max_critic_grad_norm: 5.0
    n_episodes: 85000
    n_mines: 10
    render_mode: null
    rollout_steps: 2048
    train_env_seed_start: 50000
    update_epochs: 3
    validation_episodes: 500
    validation_frequency: 5
    validation_seed_start: 500000
    wandb_entity: null
    wandb_project: minesweeper-rl
  test:
    checkpoint_path: checkpoints/ppo/2026-07-17-00-10-49-best.pt
    board_height: 9
    board_width: 9
    n_mines: 10
    test_seed_start: 1000000
    test_seed_count: 1000
    render_mode: null
    agent_seed: 42
    moving_average_window: 50
    test_output_dir: plots/test
    log_wandb: true
    wandb_project: minesweeper-rl
    wandb_entity: null

game:
  width: 9
  height: 9
  mines: 10
  seed: null
